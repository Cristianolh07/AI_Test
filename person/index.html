<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人简介</title>
  <style>
    :root {
      --bg: #000000;
      --surface: rgba(28, 28, 30, 0.72);
      --surface-border: rgba(255, 255, 255, 0.1);
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --accent: #0a84ff;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.4);
      --radius-large: 28px;
      --radius-medium: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top, #1c1c1e, #000000 100%);
      color: var(--text-primary);
    }

    .page {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 72px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 88px 56px 72px;
      text-align: center;
      border: 1px solid var(--surface-border);
      border-radius: 36px;
      background: linear-gradient(180deg, rgba(44, 44, 46, 0.8), rgba(28, 28, 30, 0.6));
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      transition:
        transform 0.45s ease,
        box-shadow 0.45s ease,
        border-color 0.45s ease,
        background 0.45s ease,
        backdrop-filter 0.45s ease;
    }

    .avatar {
      margin-bottom: 20px;
    }

    .avatar img {
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }

    .hero::before,
    .hero::after,
    .card::before,
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      transition: opacity 0.45s ease, transform 0.65s ease;
    }

    .hero::before,
    .card::before {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02) 42%, rgba(255, 255, 255, 0.05) 100%);
      opacity: 0.65;
    }

    .hero::after,
    .card::after {
      inset: -35%;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0) 30%, rgba(255, 255, 255, 0.45) 48%, rgba(255, 255, 255, 0) 66%);
      transform: translateX(-38%) rotate(10deg);
      opacity: 0;
    }

    .hero:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 255, 255, 0.2);
      background: linear-gradient(180deg, rgba(58, 58, 60, 0.85), rgba(44, 44, 46, 0.65));
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(28px);
    }

    .hero:hover::after,
    .card:hover::after {
      transform: translateX(36%) rotate(10deg);
      opacity: 1;
    }

    .eyebrow {
      margin: 0 0 14px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .hero-subtitle {
      max-width: 620px;
      margin: 20px auto 0;
      font-size: 1.15rem;
      line-height: 1.75;
      color: var(--text-secondary);
    }

    .hero-actions {
      margin-top: 30px;
    }

    .hero-link {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 14px 26px rgba(0, 113, 227, 0.24);
    }

    .hero-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 32px rgba(0, 113, 227, 0.28);
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      margin-top: 24px;
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 30px;
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-large);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      transition:
        transform 0.4s ease,
        box-shadow 0.4s ease,
        border-color 0.4s ease,
        background 0.4s ease,
        backdrop-filter 0.4s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(44, 44, 46, 0.8);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(24px);
    }

    .card-wide {
      grid-column: 1 / -1;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.9;
    }

    .skill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .skill-list li {
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(10, 132, 255, 0.15);
      color: var(--text-primary);
      font-weight: 600;
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    .skill-list li:hover {
      transform: translateY(-2px);
      background: rgba(10, 132, 255, 0.25);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
    }

    .contact-list {
      display: grid;
      gap: 14px;
    }

    .contact-item {
      padding: 18px 20px;
      border-radius: var(--radius-medium);
      background: rgba(44, 44, 46, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition:
        transform 0.3s ease,
        background 0.3s ease,
        border-color 0.3s ease,
        box-shadow 0.3s ease,
        backdrop-filter 0.3s ease;
      backdrop-filter: blur(12px);
    }

    .contact-item:hover {
      transform: translateY(-2px);
      background: rgba(58, 58, 60, 0.8);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(18px);
    }

    .contact-label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.92rem;
      color: var(--text-secondary);
    }

    .contact-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 20px, 960px);
        padding: 20px 0 48px;
      }

      .hero {
        padding: 60px 24px 52px;
        border-radius: 28px;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="avatar">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="头像" width="120" height="120">
      </div>
      <p class="eyebrow">PERSONAL PROFILE</p>
      <h1>小明</h1>
      <p class="hero-subtitle">
        热爱编程，持续学习新技术，正在一步一步搭建属于自己的高质量个人网站。
      </p>
      <div class="hero-actions">
        <a class="hero-link" href="#contact">联系我</a>
      </div>
    </section>

    <section class="content-grid">
      <article class="card card-wide">
        <h2>关于我</h2>
        <p>
          大家好，我叫小明，我喜欢编程，也喜欢学习新技术。我正在学习 Python 和 Web 开发，
          希望以后能够独立完成简单的网站和小项目。对我来说，学习不仅是掌握知识，
          更是不断打开新视野、提升解决问题能力的过程。
        </p>
      </article>

      <article class="card">
        <h2>技能列表</h2>
        <ul class="skill-list">
          <li>Python</li>
          <li>HTML</li>
          <li>CSS</li>
          <li>Git</li>
        </ul>
      </article>

      <article class="card" id="contact">
        <h2>联系信息</h2>
        <div class="contact-list">
          <div class="contact-item">
            <span class="contact-label">邮箱</span>
            <span class="contact-value">xiaoming@example.com</span>
          </div>
          <div class="contact-item">
            <span class="contact-label">电话</span>
            <span class="contact-value">123-456-7890</span>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
